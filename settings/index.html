<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ocean Vacations Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="stylesheet" href="./style.css?v=1" />
</head>
<body>
  <main class="settings-page">
    <header class="settings-header">
      <div>
        <h1>OCEAN VACATIONS</h1>
        <p>Locks and gaps settings</p>
      </div>
      <a href="../calendar_all/">Calendar</a>
    </header>

    <section class="settings-card">
      <div class="section-title">
        <h2>Admin</h2>
        <p>This key only unlocks saving from this page.</p>
      </div>
      <label>
        <span>SETTINGS_ADMIN_KEY</span>
        <input id="settingsAdminKey" type="password" autocomplete="off" placeholder="Paste settings admin key" />
      </label>
      <label class="remember-line">
        <input id="rememberAdminKey" type="checkbox" />
        <span>Remember on this device</span>
      </label>
    </section>

    <section class="settings-card">
      <div class="section-title">
        <h2>Locks</h2>
        <p>Guesty locks endpoint and authorization.</p>
      </div>
      <label>
        <span>LOCKS_API_URL</span>
        <textarea id="locksApiUrl" rows="3" placeholder="https://app.guesty.com/api/sl-service/locks?..."></textarea>
      </label>
      <label>
        <span>LOCKS_API_BEARER</span>
        <textarea id="locksApiBearer" rows="5" placeholder="Paste bearer token only, without the word Bearer"></textarea>
      </label>
      <label>
        <span>LOCKS_API_COOKIE</span>
        <textarea id="locksApiCookie" rows="5" placeholder="Optional cookie, only if needed"></textarea>
      </label>
    </section>

    <section class="settings-card">
      <div class="section-title">
        <h2>Gaps</h2>
        <p>Gaps scanner service URL and admin key.</p>
      </div>
      <label>
        <span>GAPS_API_URL</span>
        <input id="gapsApiUrl" type="text" placeholder="https://guesty-gaps.onrender.com" />
      </label>
      <label>
        <span>GAPS_ADMIN_KEY</span>
        <textarea id="gapsAdminKey" rows="3" placeholder="Paste gaps admin key"></textarea>
      </label>
    </section>

    <div class="actions">
      <button id="loadBtn" type="button">Load Current</button>
      <button id="saveBtn" type="button">Save To Render</button>
    </div>

    <div id="statusBox" class="status-box hidden"></div>
  </main>

  <script src="./app.js?v=1"></script>
</body>
</html>
