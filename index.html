<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shared Calendar | Ocean Vacations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div>
        <h1>Shared Calendar</h1>
        <p>Pool / Pest Control Schedule</p>
      </div>

      <button id="todayBtn">TODAY</button>
    </header>

    <div class="legend">
      <span class="legend-pill checkin">Check-in</span>
      <span class="legend-pill stay">Guest stay</span>
      <span class="legend-pill checkout">Checkout</span>
      <span class="legend-pill turnover-demo">
        <span>Checkout</span>
        <span>Check-in</span>
      </span>
    </div>

    <div class="scroll-note">
      Starts today and shows the next 14 days. Scroll left/right with mouse, trackpad, mobile swipe, or keyboard arrows.
    </div>

    <main id="calendarWrap" class="calendar-wrap" tabindex="0">
      <div id="calendar" class="calendar">
        <div class="loading">Loading calendar...</div>
      </div>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
