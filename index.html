<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shared Calendar | Ocean Vacations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div class="title-box">
        <h1>Shared Calendar</h1>
        <p>Pool / Pest Control Schedule</p>
      </div>

      <div class="top-actions">
        <input id="searchInput" type="text" placeholder="Search property..." />
        <span id="resultCount" class="result-count">Loading...</span>
        <button id="clearSearchBtn" class="clear-btn">Clear</button>
        <button id="todayBtn" class="today-btn">Today</button>
      </div>
    </header>

    <main class="calendar-shell">
      <aside class="property-panel">
        <div class="property-header">Property</div>
        <div id="propertyList" class="property-list"></div>
      </aside>

      <section id="calendarWrap" class="calendar-wrap" tabindex="0">
        <div id="calendar" class="calendar">
          <div class="loading">Loading calendar...</div>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
