<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shared Calendar | Ocean Vacations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="guesty-top">
      <div class="filter-row">
        <button class="filter-btn">Cities: All</button>
        <button class="filter-btn">Tags: All</button>
        <button class="filter-btn">Status: Listed</button>
        <span id="resultCount" class="result-count">Loading...</span>
        <button id="clearSearchBtn" class="clear-btn">Clear all</button>
      </div>

      <button id="todayBtn" class="today-btn">Today</button>
    </header>

    <main class="calendar-shell">
      <aside class="property-panel">
        <div class="search-box">
          <span class="search-icon">⌕</span>
          <input id="searchInput" type="text" placeholder="Search properties" />
        </div>

        <div id="propertyList" class="property-list"></div>
      </aside>

      <section id="calendarWrap" class="calendar-wrap" tabindex="0">
        <div id="calendar" class="calendar">
          <div class="loading">Loading calendar...</div>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
