<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>All Properties Calendar | Ocean Vacations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="./style.css?v=60" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div>
        <h1>All Properties Calendar</h1>
        <p>Confirmed guest stays for all properties</p>
      </div>

      <button id="todayBtn">Today</button>
    </header>

    <div class="legend">
      <span><b class="dot stay"></b> Guest</span>
      <span><b class="dot in"></b> IN</span>
      <span><b class="dot out"></b> OUT</span>
      <span><b class="dot empty"></b> No stay</span>
      <span><b class="dot nci"></b> NCI = No Check-In</span>
    </div>

    <div class="filters">
      <button id="showAllBtn" class="filter-btn active">ALL</button>
      <button id="elevatorFilterBtn" class="filter-btn">ELEVATOR</button>
      <button id="confPmtFilterBtn" class="filter-btn">CONF PMT</button>

      <button class="filter-btn area-btn" data-area="MB">MB</button>
      <button class="filter-btn area-btn" data-area="NMB">NMB</button>
      <button class="filter-btn area-btn" data-area="SSB">SSB</button>
      <button class="filter-btn area-btn" data-area="GC">GC</button>
      <button class="filter-btn area-btn" data-area="MI">MI</button>

      <button id="listToggleBtn" class="filter-btn list-btn hidden">Click for list</button>
    </div>

    <div id="filteredListPanel" class="filtered-list-panel hidden">
      <div class="filtered-list-head">
        <strong id="filteredListTitle">Filtered stays</strong>
        <span id="filteredListCount"></span>
      </div>
      <div id="filteredListBody" class="filtered-list-body"></div>
    </div>

    <main class="calendar-shell">
      <aside class="property-side">
        <div class="property-head">Property</div>
        <div id="propertyList"></div>
      </aside>

      <section id="calendarWrap" class="calendar-wrap">
        <div id="calendar" class="calendar">
          <div class="loading">Loading calendar...</div>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js?v=60"></script>
</body>
</html>
