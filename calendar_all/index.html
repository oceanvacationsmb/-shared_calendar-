<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>All Properties Calendar | Ocean Vacations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link rel="stylesheet" href="./style.css?v=122" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div>
        <h1>All Properties Calendar</h1>
        <p>Confirmed guest stays for all properties</p>
      </div>

      <button id="todayBtn">Today</button>
    </header>

    <div class="filters">
      <select id="cityFilterSelect" class="city-select">
        <option value="">FILTER</option>
        <option value="MB">MB</option>
        <option value="NMB">NORTH END</option>
        <option value="SSB">SSB</option>
        <option value="MI">MI</option>
        <option value="SOUTH">SOUTH END</option>
      </select>

      <span class="filter-divider"></span>

      <button id="tasksFilterBtn" class="filter-btn tasks-filter-btn">SEE ALL TASKS</button>
      <button id="newTaskBtn" class="filter-btn new-task-btn">ADD TASK</button>
      <button id="confPmtFilterBtn" class="filter-btn">TO CONF PMT</button>
      <button id="elevatorFilterBtn" class="filter-btn">ELEVATORS</button>

      <button id="listToggleBtn" class="filter-btn list-btn hidden">Click for list</button>
    </div>

    <div id="filteredListPanel" class="filtered-list-panel hidden">
      <div class="filtered-list-head">
        <strong id="filteredListTitle">Filtered stays</strong>
        <span id="filteredListCount"></span>
      </div>
      <div id="filteredListBody" class="filtered-list-body"></div>
    </div>

    <main class="calendar-shell">
      <aside class="property-side">
        <div class="property-head">Property</div>
        <div id="propertyList"></div>
      </aside>

      <section id="calendarWrap" class="calendar-wrap">
        <div id="calendar" class="calendar">
          <div class="loading">Loading calendar...</div>
        </div>
      </section>
    </main>
  </div>

  <!-- New Task Popup -->
  <div id="newTaskModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <strong>New Task</strong>
        <button id="closeNewTaskBtn" class="modal-x">×</button>
      </div>

      <label class="modal-label">Pick property</label>
      <select id="taskPropertySelect" class="modal-select">
        <option value="">Select property</option>
      </select>

      <label class="modal-label">Task / problem</label>
      <textarea id="taskTextInput" class="modal-textarea" placeholder="Tell us whats going on!"></textarea>

      <label class="modal-label">Person / vendor</label>
      <div class="vendor-row">
        <select id="taskAssigneeSelect" class="modal-select">
          <option value="">Choose person</option>
        </select>
        <button id="showAddVendorBtn" class="modal-btn secondary" type="button">Add New</button>
      </div>

      <div id="addVendorBox" class="add-vendor-box hidden">
        <input id="newVendorInput" class="modal-input" type="text" placeholder="New vendor name" />
        <button id="saveVendorBtn" class="modal-btn primary" type="button">Save Vendor</button>
      </div>

      <label class="modal-label">Pictures / videos</label>
      <input id="taskMediaInput" class="modal-file" type="file" accept="image/*,video/*" multiple />
      <div id="taskMediaPreview" class="media-preview"></div>

      <div id="newTaskError" class="modal-error hidden"></div>

      <div class="modal-actions">
        <button id="cancelNewTaskBtn" class="modal-btn secondary">Close</button>
        <button id="saveTaskBtn" class="modal-btn primary">Save Task</button>
      </div>
    </div>
  </div>

  <!-- View Tasks Popup -->
  <div id="viewTasksModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <strong id="viewTasksTitle">Tasks</strong>
        <button id="closeViewTasksBtn" class="modal-x">×</button>
      </div>

      <div id="tasksList" class="tasks-list"></div>

      <div class="modal-actions">
        <button id="addTaskForPropertyBtn" class="modal-btn primary">Add Task</button>
        <button id="doneViewTasksBtn" class="modal-btn secondary">Close</button>
      </div>
    </div>
  </div>

  <!-- Complete Task Popup -->
  <div id="completeTaskModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <strong>Complete Task</strong>
        <button id="closeCompleteTaskBtn" class="modal-x">Ã—</button>
      </div>

      <div id="completeTaskQuestion" class="complete-question">Would you like to upload a picture?</div>

      <div id="completeUploadBox" class="complete-upload-box hidden">
        <label class="modal-label">Pictures / videos</label>
        <input id="completeMediaInput" class="modal-file" type="file" accept="image/*,video/*" multiple />
        <div id="completeMediaPreview" class="media-preview"></div>
      </div>

      <div id="completeTaskError" class="modal-error hidden"></div>

      <div class="modal-actions">
        <button id="completeNoBtn" class="modal-btn secondary">No</button>
        <button id="completeYesBtn" class="modal-btn primary">Yes</button>
        <button id="finishCompleteTaskBtn" class="modal-btn primary hidden">Complete Task</button>
      </div>
    </div>
  </div>

  <script src="./app.js?v=122"></script>
</body>
</html>
