<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Calendar Settings | Ocean Vacations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="stylesheet" href="./style.css?v=5" />
</head>
<body>
  <main class="settings-page">
    <header class="settings-header">
      <div>
        <h1>OCEAN VACATIONS</h1>
        <p>Update Render keys</p>
      </div>
      <a href="../">Calendar</a>
    </header>

    <section class="settings-card">
      <div class="section-title">
        <h2>Save Password</h2>
      </div>
      <label>
        <span>SETTINGS_ADMIN_KEY</span>
        <input id="settingsAdminKey" type="password" autocomplete="off" placeholder="Paste settings admin key" />
      </label>
      <label class="remember-line">
        <input id="rememberAdminKey" type="checkbox" />
        <span>Remember on this device</span>
      </label>
    </section>

    <section class="settings-card">
      <div class="section-title">
        <h2>LOCKS API</h2>
        <a class="inline-link" href="https://app.guesty.com/integrations/guesty-locks-manager/locks/linked" target="_blank" rel="noreferrer">Click here to access locks page</a>
      </div>
      <label>
        <span>LOCKS API</span>
        <textarea id="locksApiBearer" rows="5" placeholder="Paste locks API key"></textarea>
      </label>
      <label>
        <span>LOCKS COOKIE</span>
        <textarea id="locksApiCookie" rows="5" placeholder="Paste cookie only if needed"></textarea>
      </label>
    </section>

    <section class="settings-card">
      <div class="section-title">
        <h2>GAPS</h2>
        <p>Get API from Guesty</p>
      </div>
      <label>
        <span>GAPS</span>
        <textarea id="gapsAdminKey" rows="3" placeholder="Paste gaps API key"></textarea>
      </label>
    </section>

    <div class="actions">
      <button id="loadBtn" type="button">Load Current</button>
      <button id="saveBtn" type="button">Save To Render</button>
    </div>

    <div id="statusBox" class="status-box hidden"></div>
  </main>

  <script src="./app.js?v=5"></script>
</body>
</html>
